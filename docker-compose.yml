services:
  bot:
    build: .
    env_file: .env
    volumes:
      - .:/app
      - /app/.venv
      - ~/.ssh:/root/.ssh:ro
    restart: unless-stopped

  web:
    build: .
    env_file: .env
    command: ["uv", "run", "uvicorn", "web_main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv
    restart: unless-stopped
